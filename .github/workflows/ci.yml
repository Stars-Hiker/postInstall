name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Shell syntax + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: bash -n (parse check)
        run: bash -n ArchHyprPostInstall.sh

      # This is a large, intentionally un-pedantic script. bash -n above already
      # catches syntax errors; here we gate only on shellcheck *error*-level
      # findings (real breakage), not the many style/info/warning suggestions.
      # SC1090/SC1091: dynamic source paths. SC2155: declare-and-assign style.
      - name: shellcheck
        run: shellcheck --severity=error -e SC1090,SC1091,SC2155 ArchHyprPostInstall.sh
